# schema_version 演进规则：
# - 1.0: 初始版本。
# - 新增字段必须有默认值，保持向后兼容。
# - 破坏性变更必须递增主版本号，并在 manifest.md 记录迁移说明。
schema_version: "1.0"
task_id: ""
change_id: ""
title: ""
slug: ""
type: "Implementation" # Discovery | OpenSpec | Implementation | Test | Documentation | Review
owner: ""
priority: "normal" # high | normal | low
status: "pending"

time:
  created_at: ""
  started_at: null
  updated_at: ""
  timeout: "30m"

budget:
  estimated_tokens: 0
  actual_tokens: 0
  max_retries: 2
  retry_count: 0

concurrency:
  # 留空或 null 表示不受并发组限制；填写名称表示与同组任务按 workflow-config.yaml 的 max_parallel 限流执行，max_parallel: 1 才是串行。
  concurrency_group: null
  # 支持精确路径和通配符，例如 src/main/java/com/example/dto/*.java。
  # 当前不会自动检测通配符重叠；Leader 必须手动判断，或使用后续辅助脚本检测。
  file_locks: []

dependencies:
  blocked_by: []
  unblocks: []
  acceptance_required: true

data_flow:
  inputs: []
  outputs: []
  contracts: []

scope:
  allowed_paths: []
  denied_paths: []

worktree:
  path: ""
  branch: ""

verification:
  build: ""
  unit_test: ""
  integration_test: ""
  coverage_command: ""
  coverage_threshold: 0
  manual_required: false

cleanup:
  cleanup_on_failure: true
  worktree_retention: "24h"
  rollback_strategy: "create_patch" # discard_changes | create_patch | keep_worktree

external_refs:
  # 只有 Claude adapter 实际创建 Claude Code Task 时填写。
  # 状态冲突时，以 .workflow-team 下的 worker-status.md、dependencies.md、result-metadata.yaml 为准。
  claude_task_id: ""
  cc_plugin_job_id: ""

outputs:
  task_log: "task-log.jsonl"
  result: "result.md"
  result_metadata: "result-metadata.yaml"
